<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — StaffMark</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

:root{
  --bg:#08090b;
  --surface:#101216;
  --surface2:#16191e;
  --border:rgba(255,255,255,0.07);
  --border-hover:rgba(255,255,255,0.14);
  --g1:#22c55e;
  --g2:#16a34a;
  --gold:#f0b429;
  --text:#f4f5f7;
  --text2:#9ca3af;
  --text3:#5b6270;
  --danger:#f87171;
  --danger-dim:rgba(248,113,113,0.1);
  --r:14px;
  --r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 800px 500px at 50% -10%, rgba(34,197,94,0.10), transparent 60%),
    radial-gradient(ellipse 600px 400px at 90% 100%, rgba(240,180,41,0.05), transparent 60%),
    var(--bg);
  color:var(--text);font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:380px;}
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.logo-icon{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,var(--g2),var(--g1));
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
  box-shadow:0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.4);
  margin-bottom:16px;
}
.brand-name{font-size:20px;font-weight:800;letter-spacing:-0.4px;color:var(--text);}
.brand-name .accent{color:var(--g1);}
.brand-tag{font-size:12.5px;color:var(--text3);margin-top:4px;letter-spacing:0.2px;}

.box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:32px 28px;
  box-shadow:0 1px 0 rgba(255,255,255,0.02) inset, 0 24px 48px -12px rgba(0,0,0,0.5);
}
.box-title{font-size:16px;font-weight:700;margin-bottom:4px;color:var(--text);}
.box-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}

.field{margin-bottom:16px;}
.fl{font-size:12.5px;color:var(--text2);font-weight:600;margin-bottom:7px;display:block;letter-spacing:0.1px;}
input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);color:var(--text);padding:12px 14px;
  font-size:14.5px;font-family:inherit;outline:none;
  transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;
}
input:hover{border-color:var(--border-hover);}
input:focus{border-color:var(--g1);background:#181c20;box-shadow:0 0 0 4px rgba(34,197,94,0.12);}
input::placeholder{color:var(--text3);}

.btn{
  width:100%;padding:13px;border-radius:var(--r-sm);border:none;
  background:linear-gradient(180deg,#34d873,var(--g2));
  color:#05130a;
  font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-top:6px;transition:transform 0.1s,box-shadow 0.15s,filter 0.15s;
  box-shadow:0 1px 0 rgba(255,255,255,0.25) inset, 0 8px 20px -6px rgba(34,197,94,0.45);
  letter-spacing:0.1px;
}
.btn:hover{filter:brightness(1.06);box-shadow:0 1px 0 rgba(255,255,255,0.25) inset, 0 10px 26px -6px rgba(34,197,94,0.55);}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:0.55;cursor:not-allowed;filter:none;}

.error{
  background:var(--danger-dim);color:var(--danger);
  border:1px solid rgba(248,113,113,0.2);
  border-radius:var(--r-sm);padding:10px 13px;font-size:12.5px;
  margin-bottom:16px;display:none;align-items:center;gap:7px;
}
.error.show{display:flex;}

.footer-note{text-align:center;font-size:11.5px;color:var(--text3);margin-top:28px;letter-spacing:0.1px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo-wrap">
      <div class="logo-icon">🌿</div>
      <div class="brand-name">Staff<span class="accent">Mark</span></div>
      <div class="brand-tag">Green Integrated Pest Control</div>
    </div>

    <div class="box">
      <div class="box-title">Sign in</div>
      <div class="box-sub">Use your StaffMark account to continue</div>

      <div class="error" id="err"><span>⚠</span><span id="errText"></span></div>

      <div class="field">
        <label class="fl">Email</label>
        <input id="email" type="email" placeholder="you@email.com" autocomplete="username"/>
      </div>
      <div class="field">
        <label class="fl">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Sign in</button>
    </div>

    <div class="footer-note">StaffMark — Employee Attendance &amp; Salary System</div>
  </div>

<script>
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errBox = document.getElementById('err');
  const errText = document.getElementById('errText');
  const btn = document.getElementById('loginBtn');
  errBox.classList.remove('show');

  if(!email || !password){
    errText.textContent = 'Please enter both email and password';
    errBox.classList.add('show');
    return;
  }

  btn.disabled = true; btn.textContent = 'Signing in…';

  try{
    const r = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await r.json();
    if(r.ok && data.success){
      window.location.href = '/';
    } else {
      errText.textContent = data.error || 'Login failed';
      errBox.classList.add('show');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  } catch(e){
    errText.textContent = 'Connection error. Please try again.';
    errBox.classList.add('show');
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}
</script>
</body>
</html>
